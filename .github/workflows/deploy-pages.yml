name: Deploy Pages

on:
  workflow_run:
    workflows: ["Merge Graph"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths: ['site/**', 'graph/global.jsonld', 'sources/**']

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site data
        run: |
          mkdir -p site/data
          cp graph/global.jsonld site/data/ 2>/dev/null || echo '{"entities":[],"relationships":[]}' > site/data/global.jsonld
          cp graph/context.jsonld site/data/ 2>/dev/null || true
          cp graph/stats.json site/data/ 2>/dev/null || echo '{}' > site/data/stats.json

          # Copy source media and metadata for viewer, timeline, and map popups
          if [ -d sources ]; then
            for src_dir in sources/*/; do
              slug=$(basename "$src_dir")
              meta="$src_dir/metadata.json"
              if [ -f "$meta" ]; then
                dest="site/data/sources/$slug"
                mkdir -p "$dest"
                cp "$src_dir"/metadata.json "$dest/" 2>/dev/null || true
                cp "$src_dir"/*.png "$dest/" 2>/dev/null || true
                # Videos (.mp4) are served from R2, not GitHub Pages
              fi
            done
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deployment
        uses: actions/deploy-pages@v4
