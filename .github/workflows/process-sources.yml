name: Process Sources
on:
  push:
    branches: [main]
    paths: ['submissions/**']

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: cd pipeline && uv sync
      - name: Detect new submissions
        id: detect
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'submissions/*.yaml' | grep -v '_schema.yaml' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Process submissions
        if: steps.detect.outputs.files != ''
        run: |
          cd pipeline
          echo "${{ steps.detect.outputs.files }}" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Processing $f..."
            uv run woograph process "../$f"
          done
      - name: Merge global graph
        run: cd pipeline && uv run woograph merge
      - name: Commit processed sources and graph
        run: |
          git config user.name "WooGraph Bot"
          git config user.email "woograph-bot@users.noreply.github.com"
          git add sources/ graph/
          git diff --staged --quiet || git commit -m "Process sources and update global graph"
          git push
