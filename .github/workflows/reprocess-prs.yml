name: Reprocess Open Submissions on Pipeline Change

on:
  push:
    branches: [main]
    paths: ['pipeline/**']
  workflow_dispatch:

jobs:
  reprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Find open submission PRs and trigger reprocess
        run: |
          git config user.name "WooGraph Bot"
          git config user.email "woograph-bot@users.noreply.github.com"

          # Get all open PRs
          gh pr list --state open --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"' | \
          while read -r pr_number head_ref; do
            # Check if this PR touches submissions/
            HAS_SUBMISSIONS=$(gh pr view "$pr_number" --json files \
              --jq '.files[].path | select(startswith("submissions/") and endswith(".yaml"))' \
              2>/dev/null | grep -v '_schema' | head -1 || true)

            if [ -z "$HAS_SUBMISSIONS" ]; then
              continue
            fi

            echo "Resetting PR #$pr_number ($head_ref) to main + submission files only"

            # Fetch the PR branch, then rebuild it from main with only the
            # submission files — discards old fragment/source commits cleanly
            git fetch origin "$head_ref"
            git checkout -B "$head_ref" origin/main
            git checkout "origin/$head_ref" -- submissions/
            COMMIT_MSG=$(git log --format=%s "origin/main..origin/$head_ref" -- submissions/ | tail -1)
            git commit -m "${COMMIT_MSG:-Reprocess submission}"
            git push origin "$head_ref" --force-with-lease
            git checkout main
          done
