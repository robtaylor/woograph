name: Reprocess Source

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Source slug to reprocess (e.g. wittenberge-ufo-2013), or "all" to reprocess every submission'
        required: true
        type: string

jobs:
  reprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WOOGRAPH_PDF_BACKEND: auto
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          sudo curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp
          ffmpeg -version | head -1

      - name: Install dependencies
        run: cd pipeline && uv sync

      - name: Resolve submission files
        id: resolve
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ "$SLUG" = "all" ]; then
            FILES=$(find submissions -name '*.yaml' -not -name '_schema.yaml' | sort)
          else
            FILE="submissions/${SLUG}.yaml"
            if [ ! -f "$FILE" ]; then
              echo "::error::Submission not found: $FILE"
              exit 1
            fi
            FILES="$FILE"
          fi
          COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Reprocessing $COUNT submission(s): $FILES"

      - name: Process submissions
        run: |
          cd pipeline
          FAILED=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::Processing $f"
            if uv run woograph process "../$f"; then
              echo "✅ $f"
            else
              echo "::error::Failed to process $f"
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"
          done <<< "${{ steps.resolve.outputs.files }}"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED submission(s) failed to process"
            exit 1
          fi

      - name: Commit updated sources and fragments
        run: |
          git config user.name "WooGraph Bot"
          git config user.email "woograph-bot@users.noreply.github.com"
          git add sources/ graph/fragments/ graph/entities/
          git diff --staged --quiet || git commit -m "Reprocess: ${{ github.event.inputs.slug }}"
          git push
