$schema: "https://json-schema.org/draft/2020-12/schema"
title: WooGraph Source Submission
type: object
required: [source]
properties:
  source:
    type: object
    required: [title, type, date_added]
    properties:
      title:
        type: string
        minLength: 1
      type:
        type: string
        enum: [pdf, url, account, video]
      url:
        type: string
        format: uri
      file:
        type: string
      author:
        type: string
      date_added:
        type: string
        format: date
      tags:
        type: array
        items:
          type: string
      description:
        type: string
    allOf:
      - if:
          properties:
            type:
              const: url
        then:
          required: [url]
      - if:
          properties:
            type:
              const: video
        then:
          anyOf:
            - required: [file]
            - required: [url]
          properties:
            processing:
              type: object
              properties:
                start:
                  type: string
                  description: "Clip start time (e.g. '1:30' or '90')"
                end:
                  type: string
                  description: "Clip end time (e.g. '2:45' or '165')"
                scale:
                  type: integer
                  description: "Super-resolution scale factor (default 2)"
                max_frames:
                  type: integer
                frame_step:
                  type: integer
                padding_factor:
                  type: number
                psf_sigma:
                  type: number
                save_crops:
                  type: boolean
      - if:
          properties:
            type:
              const: pdf
        then:
          anyOf:
            - required: [file]
            - required: [url]
